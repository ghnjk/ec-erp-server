    description: 接口变更（新增/修改/删除）必须同步更新代码、design 文档、模块 spec、docs/erp_api/、config.yaml；并在 design/<module>/<action>.md 末尾追加 Change-Log。
    required_steps:
      - 修改 ec_erp_api/apis/<module>.py 中的 handler
      - 修改/新增 openspec/specs/apis/design/<module>/<action>.md
      - 同步 openspec/specs/<module>_module_spec.md 接口清单
      - 同步 docs/erp_api/<module>/<action>.md 业务文档
      - 在 design 文件末尾追加 Change-Log（含变更类型、原因、内容、前端影响、回滚方式、关联代码）
      - 更新 openspec/specs/config.yaml 中 apis.routes 与 apis.total_count
      - 不兼容变更（必填参数 / 字段类型 / URL 变更）需要同步升级 ec-erp-static 前端

money_unit_convention:
  default: 整数（分）
  exceptions:
    - table: t_sku_sale_price
      field: Funit_price
      type: Float (元)
    - table: t_sale_order
      field: Ftotal_amount
      type: Float (元)

constraints:
  - name: api_decorator
    description: 所有 /erp_api/* 接口必须使用 @api_post_request() 装饰器
  - name: response_format
    description: 响应使用 response_util.pack_*_response 包装，结构 {result, resultMsg, traceId, data}
  - name: param_extraction
    description: 请求参数从 request.json["body"] 取，使用 request_util.get_*_param
  - name: backend_access
    description: API 中通过 request_context.get_backend() 获取数据库后端，工具/同步脚本通过 build_backend(project_id)
  - name: project_isolation
    description: 业务表必须包含 Fproject_id 字段；查询/写入必须显式传入 project_id
  - name: db_no_foreign_key
    description: 数据库不使用外键约束，关联在应用层校验
  - name: logical_delete
    description: 删除采用 Fis_delete=1 逻辑删除，不物理删除（拣货/打印任务表除外）
  - name: password_hash
    description: 用户密码使用 codec_util.calc_sha256 加密存储
  - name: secret_management
    description: application.json 不入版本控制，session_secret_key、ydm_token、密码不出现在日志中
